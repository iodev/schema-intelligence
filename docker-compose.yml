services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  schema-intelligence:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./schema-intelligence.yaml:/app/schema-intelligence.yaml:ro
    environment:
      SI_QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
